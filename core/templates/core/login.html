<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sky Engineering Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d1b2a, #0066cc);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .btn-primary { background-color: #0066cc; border-color: #0066cc; }
        .btn-primary:hover { background-color: #0052a3; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card login-card p-4">
                    <div class="card-body">
                        <h2 class="text-center fw-bold mb-1">Sky Engineering</h2>
                        <p class="text-center text-muted mb-4">Sign in to your account</p>

                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-danger">{{ message }}</div>
                            {% endfor %}
                        {% endif %}

                        <form method="post">
                            {% csrf_token %}
                            {% for field in form %}
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">{{ field.label }}</label>
                                    <input
                                        type="{{ field.field.widget.input_type }}"
                                        name="{{ field.html_name }}"
                                        class="form-control"
                                        placeholder="{{ field.label }}"
                                    >
                                    {% if field.errors %}
                                        <div class="text-danger small mt-1">{{ field.errors }}</div>
                                    {% endif %}
                                </div>
                            {% endfor %}
                            <button type="submit" class="btn btn-primary w-100 py-2 mt-2">Sign In</button>
                        </form>

                        <p class="text-center mt-3 mb-0 text-muted small">
                            Don't have an account?
                            <a href="{% url 'core:register' %}">Register here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

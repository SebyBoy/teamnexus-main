{% extends "messaging/base.html" %}

{% block content %}

<h1>Compose Message ✉️</h1>

<!-- Error feedback improves usability -->
{% if error %}
    <p style="color: yellow;">{{ error }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <!-- User input for receiver -->
    <input type="text" name="receiver" placeholder="Enter username">

    <!-- Message content input -->
    <textarea name="content" placeholder="Write your message"></textarea>

    <!-- Action buttons -->
    <button name="action" value="send">Send</button>
    <button name="action" value="draft">Save Draft</button>

</form>

{% endblock %}
